<!DOCTYPE html>
<html lang="pt-BR" data-lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Provas com IA</title>
<meta name="description" content="Gere provas personalizadas a partir dos seus arquivos de estudo usando IA. Grátis, sem login, funciona no navegador.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-0: #0a0a0f;
    --bg-1: #13131a;
    --bg-2: #1a1a24;
    --bg-3: #232333;
    --border: #2a2a3a;
    --text: #e4e4ef;
    --text-dim: #8888a0;
    --accent: #a855f7;
    --accent-2: #ec4899;
    --accent-3: #06b6d4;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
  }
  html { color-scheme: dark; }
  body {
    margin: 0;
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 0%, rgba(168, 85, 247, 0.15), transparent 60%),
      radial-gradient(ellipse 60% 50% at 0% 100%, rgba(236, 72, 153, 0.1), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 10px 30px -8px var(--accent);
  }
  .logo h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .logo p {
    margin: 0;
    font-size: 12px;
    color: var(--text-dim);
  }
  select.lang-select {
    padding: 8px 30px 8px 12px;
    border: 1px solid var(--border);
    background: var(--bg-2) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238888a0'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 8px center / 16px;
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    appearance: none;
  }
  select.lang-select:hover { border-color: var(--accent); }

  /* Cards */
  .card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card h2 .num {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }

  /* Form */
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
  }
  textarea, input[type="text"], input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  textarea:focus, input:focus {
    border-color: var(--accent);
  }
  textarea {
    min-height: 100px;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .row {
    display: grid;
    gap: 16px;
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 640px) {
    .row { grid-template-columns: 1fr; }
  }

  /* File upload */
  .file-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-2);
  }
  .file-zone:hover, .file-zone.dragging {
    border-color: var(--accent);
    background: rgba(168, 85, 247, 0.05);
  }
  .file-zone input { display: none; }
  .file-zone-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }
  .file-zone-text {
    color: var(--text-dim);
    font-size: 13px;
  }
  .file-zone-text strong { color: var(--accent); }
  .file-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .file-item button {
    background: transparent;
    border: none;
    color: var(--error);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
  }

  /* Button */
  .btn {
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn:hover {
    box-shadow: 0 10px 30px -8px var(--accent);
    transform: translateY(-1px);
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-secondary {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: none;
    transform: none;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Loading */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: rgba(168, 85, 247, 0.08);
    border: 1px solid var(--accent);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(168, 85, 247, 0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--accent); font-size: 14px; font-weight: 500; }

  /* Quiz display */
  .quiz-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .quiz-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

  .question {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .question-num {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .question-text {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 500;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-left: 40px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }
  .option:hover { border-color: var(--accent); background: rgba(168, 85, 247, 0.05); }
  .option input { margin-top: 3px; accent-color: var(--accent); }
  .option.correct {
    background: rgba(16, 185, 129, 0.1);
    border-color: var(--success);
    color: var(--success);
  }
  .option.wrong {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--error);
    color: var(--error);
  }
  .option-letter {
    font-weight: 700;
    color: var(--accent);
    margin-right: 4px;
  }

  .score-card {
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(236, 72, 153, 0.1));
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .score-card h3 {
    margin: 0 0 8px;
    font-size: 16px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .score-value {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .explanation {
    margin-top: 12px;
    padding: 12px;
    background: rgba(6, 182, 212, 0.05);
    border-left: 3px solid var(--accent-3);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .explanation strong { color: var(--accent-3); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 12px 20px;
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 40px;
    padding: 24px;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* Print friendly */
  @media print {
    body::before { display: none; }
    .btn, .btn-row, select.lang-select, .file-zone { display: none !important; }
    .card { border: none; padding: 0; }
  }
</style>
</head>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">📝</div>
      <div>
        <h1 data-i18n="title">Gerador de Provas com IA</h1>
        <p data-i18n="subtitle">Estude inteligente — a IA cria provas personalizadas pra você</p>
      </div>
    </div>
    <select class="lang-select" id="langSelect">
      <option value="pt-BR">🇧🇷 PT-BR</option>
      <option value="en">🇺🇸 EN</option>
      <option value="es">🇪🇸 ES</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="de">🇩🇪 DE</option>
      <option value="it">🇮🇹 IT</option>
      <option value="ja">🇯🇵 JP</option>
      <option value="zh-CN">🇨🇳 ZH</option>
    </select>
  </header>

  <!-- Step 1: Configuration -->
  <div class="card">
    <h2><span class="num">1</span> <span data-i18n="step1">Configure sua prova</span></h2>

    <label data-i18n="topic-label">Tópico da prova (opcional se você anexar arquivos)</label>
    <input type="text" id="topic" data-i18n-ph="topic-ph" placeholder="Ex.: História do Brasil, Álgebra, Biologia celular...">

    <div style="height: 16px;"></div>

    <label data-i18n="files-label">Anexe seus arquivos de estudo (.txt, .md, .csv)</label>
    <label class="file-zone" for="fileInput">
      <div class="file-zone-icon">📎</div>
      <div class="file-zone-text">
        <strong data-i18n="files-click">Clique pra selecionar</strong>
        <span data-i18n="files-or"> ou arraste arquivos aqui</span>
      </div>
      <input type="file" id="fileInput" multiple accept=".txt,.md,.csv,.json,.log">
    </label>
    <div class="file-list" id="fileList"></div>

    <div style="height: 16px;"></div>

    <div class="row">
      <div>
        <label data-i18n="num-label">Número de questões</label>
        <input type="number" id="numQuestions" value="5" min="1" max="15">
      </div>
      <div>
        <label data-i18n="level-label">Nível de dificuldade</label>
        <select id="level" class="lang-select" style="width: 100%;">
          <option value="easy" data-i18n="level-easy">Fácil</option>
          <option value="medium" selected data-i18n="level-medium">Médio</option>
          <option value="hard" data-i18n="level-hard">Difícil</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Step 2: Generate -->
  <div class="card">
    <h2><span class="num">2</span> <span data-i18n="step2">Gere e responda</span></h2>

    <div class="btn-row">
      <button class="btn" id="generateBtn">
        <span>✨</span>
        <span data-i18n="generate">Gerar prova com IA</span>
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <span>🗑️</span>
        <span data-i18n="clear">Limpar</span>
      </button>
    </div>

    <div style="height: 16px;"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText" data-i18n="loading">Gerando prova com IA...</div>
    </div>
  </div>

  <!-- Step 3: Quiz -->
  <div class="card" id="quizCard" style="display: none;">
    <h2><span class="num">3</span> <span data-i18n="step3">Prova gerada</span></h2>

    <div id="scoreCard" class="score-card" style="display: none;">
      <h3 data-i18n="your-score">Sua pontuação</h3>
      <div class="score-value" id="scoreValue">0/0</div>
    </div>

    <div id="quizContent"></div>

    <div class="btn-row" style="margin-top: 20px;">
      <button class="btn" id="gradeBtn" style="display: none;">
        <span>✅</span>
        <span data-i18n="grade">Corrigir prova</span>
      </button>
      <button class="btn btn-secondary" id="newQuizBtn" style="display: none;">
        <span>🔄</span>
        <span data-i18n="new-quiz">Nova prova</span>
      </button>
      <button class="btn btn-secondary" id="printBtn" style="display: none;">
        <span>🖨️</span>
        <span data-i18n="print">Imprimir / PDF</span>
      </button>
    </div>
  </div>

  <footer>
    <span data-i18n="footer-made">Feito com</span> 💜 <span data-i18n="footer-by">por</span> <a href="https://github.com/lukepalys" target="_blank" rel="noopener">LukePalys</a> • <span data-i18n="footer-tech">Pollinations AI · 100% no navegador</span>
  </footer>
</div>

<div class="toast" id="toast"></div>

function t(key) {
  const lang = document.documentElement.lang || 'pt-BR';
  return (I18N[lang] && I18N[lang][key]) || I18N['en'][key] || key;
}

function applyLang(lang) {
  document.documentElement.lang = lang;
  document.documentElement.setAttribute('data-lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    el.placeholder = t(key);
  });
  document.title = t('title');
}

// ===================== STATE =====================
let uploadedFiles = []; // {name, content}
let currentQuiz = null;

// ===================== POLLINATIONS CALL =====================
async function callAI(messages) {
  const res = await fetch('https://text.pollinations.ai/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'openai-fast',
      messages,
      temperature: 0.7,
      max_tokens: 2500,
    }),
  });
  if (!res.ok) throw new Error('Pollinations error: ' + res.status);
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

// ===================== FILE HANDLING =====================
function renderFileList() {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  uploadedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span>📄 ${f.name} <span style="color:var(--text-dim);font-size:11px">(${f.content.length} chars)</span></span>
      <button onclick="removeFile(${i})" title="Remove">×</button>
    `;
    list.appendChild(item);
  });
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderFileList();
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (file.size > 500 * 1024) {
      showToast(`⚠️ ${file.name} muito grande (máx 500KB)`);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedFiles.push({ name: file.name, content: e.target.result });
      renderFileList();
    };
    reader.readAsText(file);
  });
}

// ===================== QUIZ GENERATION =====================
async function generateQuiz() {
  const topic = document.getElementById('topic').value.trim();
  const numQ = parseInt(document.getElementById('numQuestions').value) || 5;
  const level = document.getElementById('level').value;

  if (!topic && uploadedFiles.length === 0) {
    showToast(t('need-topic-or-files'));
    return;
  }

  // Build context
  let context = '';
  if (uploadedFiles.length > 0) {
    context = uploadedFiles.map(f => `=== ${f.name} ===\n${f.content.slice(0, 3000)}`).join('\n\n');
  }

  const lang = document.documentElement.lang || 'pt-BR';
  const langName = { 'pt-BR': 'Portuguese (Brazil)', en: 'English', es: 'Spanish', fr: 'French', de: 'German', it: 'Italian', ja: 'Japanese', 'zh-CN': 'Chinese (Simplified)' }[lang] || 'English';

  const systemPrompt = `You are a quiz generator. Create educational quizzes in ${langName}. Always respond with valid JSON only — no markdown, no code blocks, just the JSON object.`;

  const userPrompt = `Create a quiz with the following specifications:
- Number of questions: ${numQ}
- Difficulty: ${level}
- Topic: ${topic || '(derived from the study files)'}
${context ? `- Study material context:\n${context.slice(0, 6000)}` : ''}

Each question should have 4 options (a, b, c, d) with exactly one correct answer.
Include a brief explanation for why the correct answer is right.

Respond ONLY with this JSON format (no markdown, no code fences):
{
  "questions": [
    {
      "question": "The question text",
      "options": {
        "a": "Option A text",
        "b": "Option B text",
        "c": "Option C text",
        "d": "Option D text"
      },
      "correct": "a",
      "explanation": "Brief explanation why 'a' is correct"
    }
  ]
}`;

  document.getElementById('loading').classList.add('show');
  document.getElementById('generateBtn').disabled = true;

  try {
    const response = await callAI([
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userPrompt },
    ]);

    // Parse JSON (handle markdown fences if AI added them)
    let cleaned = response.replace(/^```json?\s*|\s*```$/g, '').trim();
    const quiz = JSON.parse(cleaned);

    if (!quiz.questions || !Array.isArray(quiz.questions) || quiz.questions.length === 0) {
      throw new Error('No questions in response');
    }

    currentQuiz = quiz;
    renderQuiz(quiz);
  } catch (err) {
    console.error('Generate error:', err);
    showToast(t('failed'));
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('generateBtn').disabled = false;
  }
}

function renderQuiz(quiz) {
  document.getElementById('quizCard').style.display = 'block';
  const content = document.getElementById('quizContent');
  content.innerHTML = '';

  quiz.questions.forEach((q, i) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question';
    qDiv.dataset.correct = q.correct;
    qDiv.innerHTML = `
      <div class="question-header">
        <div class="question-num">${i + 1}</div>
        <div class="question-text">${escapeHtml(q.question)}</div>
      </div>
      <div class="options">
        ${['a', 'b', 'c', 'd'].map(letter => `
          <label class="option" data-letter="${letter}">
            <input type="radio" name="q${i}" value="${letter}">
            <span class="option-letter">${letter.toUpperCase()}.</span>
            <span>${escapeHtml(q.options[letter] || '')}</span>
          </label>
        `).join('')}
      </div>
      <div class="explanation" style="display:none;">
        <strong>${t('explanation')}:</strong> ${escapeHtml(q.explanation || '')}
      </div>
    `;
    content.appendChild(qDiv);
  });

  document.getElementById('gradeBtn').style.display = 'inline-flex';
  document.getElementById('newQuizBtn').style.display = 'inline-flex';
  document.getElementById('printBtn').style.display = 'inline-flex';
  document.getElementById('scoreCard').style.display = 'none';

  // Scroll to quiz
  document.getElementById('quizCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function gradeQuiz() {
  if (!currentQuiz) return;
  const questions = document.querySelectorAll('.question');
  let answered = 0;
  let correct = 0;

  questions.forEach((qDiv, i) => {
    const correctAnswer = qDiv.dataset.correct;
    const selected = qDiv.querySelector(`input[name="q${i}"]:checked`);

    if (selected) {
      answered++;
      const selectedLetter = selected.value;
      const optionLabels = qDiv.querySelectorAll('.option');

      optionLabels.forEach(label => {
        const letter = label.dataset.letter;
        if (letter === correctAnswer) {
          label.classList.add('correct');
        } else if (letter === selectedLetter && selectedLetter !== correctAnswer) {
          label.classList.add('wrong');
        }
        // Disable further changes
        label.style.pointerEvents = 'none';
        const input = label.querySelector('input');
        if (input) input.disabled = true;
      });

      // Show explanation
      const expl = qDiv.querySelector('.explanation');
      if (expl) expl.style.display = 'block';

      if (selectedLetter === correctAnswer) correct++;
    }
  });

  if (answered < questions.length) {
    showToast(t('select-answers'));
    return;
  }

  // Show score
  const scoreCard = document.getElementById('scoreCard');
  scoreCard.style.display = 'block';
  document.getElementById('scoreValue').textContent = `${correct}/${questions.length}`;
  document.getElementById('gradeBtn').style.display = 'none';

  scoreCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function newQuiz() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('quizContent').innerHTML = '';
  currentQuiz = null;
  document.getElementById('topic').focus();
}

function clearAll() {
  uploadedFiles = [];
  currentQuiz = null;
  document.getElementById('topic').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('quizContent').innerHTML = '';
  renderFileList();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', () => {
  // Language
  const savedLang = localStorage.getItem('quiz-lang') || (navigator.language || 'pt-BR');
  const supported = Object.keys(I18N);
  const matched = supported.find(l => savedLang.startsWith(l.split('-')[0])) || 'pt-BR';
  document.getElementById('langSelect').value = matched;
  applyLang(matched);

  document.getElementById('langSelect').addEventListener('change', (e) => {
    localStorage.setItem('quiz-lang', e.target.value);
    applyLang(e.target.value);
  });

  // File input
  const fileInput = document.getElementById('fileInput');
  const fileZone = document.querySelector('.file-zone');

  fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

  fileZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    fileZone.classList.add('dragging');
  });
  fileZone.addEventListener('dragleave', () => fileZone.classList.remove('dragging'));
  fileZone.addEventListener('drop', (e) => {
    e.preventDefault();
    fileZone.classList.remove('dragging');
    handleFiles(e.dataTransfer.files);
  });

  // Buttons
  document.getElementById('generateBtn').addEventListener('click', generateQuiz);
  document.getElementById('clearBtn').addEventListener('click', clearAll);
  document.getElementById('gradeBtn').addEventListener('click', gradeQuiz);
  document.getElementById('newQuizBtn').addEventListener('click', newQuiz);
  document.getElementById('printBtn').addEventListener('click', () => window.print());
});
